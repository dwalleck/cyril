name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Release - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cyril-linux-x86_64
            bin_path: target/release/cyril
          - os: macos-latest
            artifact_name: cyril-macos-aarch64
            bin_path: target/release/cyril
          - os: windows-latest
            artifact_name: cyril-windows-x86_64.exe
            bin_path: target/release/cyril.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --all-features --bin cyril

      - name: Stage binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Stage binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "${{ matrix.bin_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
